/* ═══ API ═══ */
const API={
  async login(username,pin){
    const{data}=await sb.from("users").select("id,name,username,phone,role,created_by")
      .eq("username",username.toLowerCase().trim())
      .eq("pin_hash",pin)
      .eq("is_active",true).single();
    return data;
  },
  // Admin: get team transactions. Colaborador: only their caja transactions
  async getTx(userId,role,limit=200){
    let q=sb.from("transactions").select("*,users!transactions_user_id_fkey(name),cajas(name,icon,type)").order("created_at",{ascending:false}).limit(limit);
    if(role==="admin"){
      // Get team member IDs first, then filter
      const{data:teamUsers}=await sb.from("users").select("id").or(`id.eq.${userId},created_by.eq.${userId}`);
      const ids=(teamUsers||[]).map(u=>u.id);
      if(ids.length>0)q=q.in("user_id",ids);
    }else{
      // Colaborador: only transactions in their assigned cajas
      const{data:myCajas}=await sb.from("cajas").select("id").eq("assigned_to",userId);
      const cajaIds=(myCajas||[]).map(c=>c.id);
      if(cajaIds.length>0)q=q.in("caja_id",cajaIds);
      else q=q.eq("user_id",userId).is("caja_id",null); // fallback: own tx without caja
    }
    const{data}=await q;return data||[];
  },
  async addTx(userId,type,amount,cajaId,note="",method="efectivo",source="web"){
    const{data,error}=await sb.from("transactions").insert({user_id:userId,type,amount,method,caja_id:cajaId||null,note,source}).select().single();
    if(error)throw error;return data;
  },
  async deleteTx(id){
    const{error}=await sb.from("transactions").delete().eq("id",id);
    if(error)throw error;
  },
  // Balance: admin=team, colaborador=their cajas
  async getBalance(userId,role){
    if(role==="admin"){const{data}=await sb.rpc("get_team_balance",{p_admin_id:userId});return data||0;}
    const{data}=await sb.rpc("get_colab_balance",{p_user_id:userId});return data||0;
  },
  async getTodaySummary(userId,role){
    if(role==="admin"){const{data}=await sb.rpc("get_team_today_summary",{p_admin_id:userId});return data?.[0]||{ingresos:0,salidas:0,movimientos:0,saldo:0};}
    const{data}=await sb.rpc("get_colab_today_summary",{p_user_id:userId});return data?.[0]||{ingresos:0,salidas:0,movimientos:0,saldo:0};
  },
  // Cajas: admin=cajas they created, colaborador=assigned to them
  async getCajas(userId,role){
    if(role==="admin"){
      const{data}=await sb.from("caja_summary").select("*").eq("is_active",true);
      // Filter to cajas created by this admin's team
      return(data||[]).filter(c=>true); // TODO: when created_by is set properly, filter here
    }
    const{data}=await sb.from("caja_summary").select("*").eq("assigned_to",userId).eq("is_active",true);
    return data||[];
  },
  async getAllCajas(adminId){
    const{data}=await sb.from("cajas").select("*,users!cajas_assigned_to_fkey(name)").eq("created_by",adminId).order("name");
    return data||[];

  async toggleCaja(id,active){await sb.from("cajas").update({is_active:active}).eq("id",id);},
  // Users: admin only sees their team
  async getUsers(adminId){
    const{data}=await sb.from("users").select("id,name,username,role,phone,is_active,created_at")
      .or(`id.eq.${adminId},created_by.eq.${adminId}`)
      .order("created_at");

  async createUser(name,username,pin,phone,createdBy){const{data,error}=await sb.from("users").insert({name,username:username.toLowerCase().trim(),pin_hash:pin,phone:phone||null,role:"colaborador",created_by:createdBy}).select().single();if(error)throw error;return data;},
  async toggleUser(id,active){await sb.from("users").update({is_active:active}).eq("id",id);},
  // Chat persistence
  async loadChat(userId){
    const{data}=await sb.from("chat_logs").select("messages").eq("user_id",userId).single();
    return data?.messages||[];
  },
  async saveChat(userId,messages){
    await sb.from("chat_logs").upsert({user_id:userId,messages},{onConflict:"user_id"});
  },
};

/* ═══ PARSER ═══ */
const IR=/\b(entr[oóaé]|recib[oíieó]|pag(?:aron|ó)|cobr[oéeó]|vend[oíió]|ingres[oóeé]|lleg[oóa]|deposit[oóaé]|abon[oóaé]|me\s+(?:dieron|pagaron|entraron|llegaron))\b/i;
const SR=/\b(pagu[eé]|gast[eéoó]|sal(?:ieron|ió)|entregu[eé]|compr[eéoó]|salida|di\b|pag[oó]|transfer[ií]|enviar?[oé]?|envié|mand[eé]|desembols[eéoó])\b/i;
function pAmt(t){t=t.toLowerCase().replace(/\./g,"").replace(/,/g,".");if(/medio\s+mill[oó]n/.test(t))return 5e5;if(/\bun\s+mill[oó]n\b/.test(t))return 1e6;let m=t.match(/([\d]+(?:\.[\d]+)?)\s*mill[oó]n(?:es)?/);if(m)return Math.round(parseFloat(m[1])*1e6);m=t.match(/([\d]+(?:\.[\d]+)?)\s*m\b/);if(m&&parseFloat(m[1])<1000)return Math.round(parseFloat(m[1])*1e6);m=t.match(/([\d]+(?:\.[\d]+)?)\s*mil\b/);if(m)return Math.round(parseFloat(m[1])*1e3);m=t.match(/([\d]+(?:\.[\d]+)?)\s*k\b/);if(m)return Math.round(parseFloat(m[1])*1e3);m=t.match(/\b(\d{3,})\b/);if(m)return parseInt(m[1],10);return null;}
function pNote(text){let t=text.replace(/\b(me|en|por|de|la|el|los|las|un|una|que|con|para|le|les|se|al|del)\b/gi," ");t=t.replace(IR," ").replace(SR," ");t=t.replace(/\d[\d.,]*\s*(mill[oó]n(?:es)?|mil|m\b|k\b)?/gi," ");t=t.replace(/\s+/g," ").trim();return t.length>2&&t.length<50?t.charAt(0).toUpperCase()+t.slice(1):"";}
function parseMsg(text){const isI=IR.test(text),isS=SR.test(text),amt=pAmt(text),note=pNote(text);if(/\b(saldo|cu[aá]nto|c[oó]mo\s+voy|resumen|total|balance)\b/i.test(text))return{type:"saldo"};if(!amt)return null;const tipo=isI?"ingreso":isS?"salida":null;if(!tipo)return{type:"need_type",amount:amt,note};return{type:"need_caja",tipo,amount:amt,note};}

/* ═══ FORMAT ═══ */
const fmt=n=>"$"+Math.abs(n).toLocaleString("es-CO");
const fmtS=n=>{const a=Math.abs(n);if(a>=1e6)return"$"+(a/1e6).toLocaleString("es-CO",{maximumFractionDigits:1})+"M";if(a>=1e3)return"$"+(a/1e3).toLocaleString("es-CO",{maximumFractionDigits:0})+"mil";return"$"+a;};
const timeStr=iso=>{const d=new Date(iso);return`${d.getHours()%12||12}:${String(d.getMinutes()).padStart(2,"0")} ${d.getHours()>=12?"pm":"am"}`;};
const dateLabel=iso=>{const d=new Date(iso),now=new Date();if(d.toDateString()===now.toDateString())return"Hoy";const y=new Date(now);y.setDate(y.getDate()-1);if(d.toDateString()===y.toDateString())return"Ayer";const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return`${d.getDate()} ${ms[d.getMonth()]}`;};
const TICONS={efectivo:"💵",banco:"🏦",nequi:"📱",daviplata:"📲",otro:"💳"};

/* ═══ LOGIN ═══ */
function LoginScreen({onLogin}){
  const[step,setStep]=useState("user"); // user | pin
  const[username,setUsername]=useState("");
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[ld,setLd]=useState(false);
  const inputRef=useRef(null);

  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),100);},[step]);

  const goToPin=()=>{
    if(!username.trim()){setErr("Ingresa tu usuario");return;}
    setErr("");setStep("pin");
  };

  const handleKey=k=>{if(k==="⌫")setPin(p=>p.slice(0,-1));else if(pin.length<6)setPin(p=>p+k);};

  const submit=async()=>{
    if(pin.length<4)return;setLd(true);setErr("");
    const u=await API.login(username,pin);
    if(u){localStorage.setItem("mc_user",JSON.stringify(u));onLogin(u);}
    else{setErr("Usuario o PIN incorrecto");setPin("");}
    setLd(false);
  };

  useEffect(()=>{if(pin.length===4)submit();},[pin]);

  const is={
    wrap:{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#075e54",padding:24},
    logo:{fontSize:48,marginBottom:8},
    title:{color:"#fff",fontSize:24,fontWeight:800,fontFamily:F,marginBottom:4},
    sub:{color:"#a8d8c8",fontSize:14,fontWeight:600,marginBottom:24},
    inputWrap:{width:"100%",maxWidth:280,marginBottom:16},
    label:{color:"#a8d8c8",fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6,display:"block"},
    input:{width:"100%",padding:"14px 16px",borderRadius:14,border:"2px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.1)",color:"#fff",fontSize:18,fontWeight:600,fontFamily:F,textAlign:"center"},
    btn:{width:"100%",maxWidth:280,padding:"14px",borderRadius:14,border:"none",background:"#25d366",color:"#fff",fontSize:17,fontWeight:700,fontFamily:F,cursor:"pointer",marginTop:8},
    err:{color:"#ff6b6b",fontSize:13,fontWeight:700,marginTop:8},
    back:{background:"none",border:"none",color:"#a8d8c8",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:F,marginTop:16},
    dots:{display:"flex",gap:14,marginBottom:8},
    dot:(filled)=>({width:18,height:18,borderRadius:"50%",border:"2px solid #a8d8c8",background:filled?"#25d366":"transparent",transition:"background .15s"}),
    keypad:{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:10,marginTop:24},
    key:{width:72,height:56,borderRadius:14,border:"none",background:"rgba(255,255,255,0.12)",color:"#fff",fontSize:24,fontWeight:600,fontFamily:F,cursor:"pointer"},
  };

  // Step 1: Username
  if(step==="user") return ce("div",{style:is.wrap},
    ce("div",{style:is.logo},"💰"),
    ce("div",{style:is.title},"MisCuentas"),
    ce("div",{style:is.sub},"Ingresa tu usuario"),
    ce("div",{style:is.inputWrap},
      ce("input",{ref:inputRef,style:is.input,placeholder:"usuario",value:username,
        onChange:e=>setUsername(e.target.value.replace(/\s/g,"")),
        onKeyDown:e=>{if(e.key==="Enter")goToPin();},
        autoCapitalize:"none",autoCorrect:"off",spellCheck:false})),
    ce("button",{style:{...is.btn,opacity:username.trim()?.9:.4},onClick:goToPin},"Continuar →"),
    err&&ce("div",{style:is.err},err));

  // Step 2: PIN
  return ce("div",{style:is.wrap},
    ce("div",{style:is.logo},"🔐"),
    ce("div",{style:is.title},"Hola, "+username),
    ce("div",{style:is.sub},"Ingresa tu PIN"),
    ce("div",{style:is.dots},[0,1,2,3].map(i=>ce("div",{key:i,style:is.dot(i<pin.length)}))),
    err&&ce("div",{style:is.err},err),
    ld&&ce("div",{style:{color:"#a8d8c8",fontSize:13,marginTop:8}},"Verificando..."),
    ce("div",{style:is.keypad},["1","2","3","4","5","6","7","8","9","","0","⌫"].map(k=>k===""?ce("div",{key:"e"}):ce("button",{key:k,onClick:()=>handleKey(k),style:is.key},k))),
    ce("button",{style:is.back,onClick:()=>{setStep("user");setPin("");setErr("");}},"← Cambiar usuario"));
}

/* ═══ MAIN APP ═══ */
function MainApp({user}){
  const isA=user.role==="admin";
  const[records,setRecords]=useState([]);const[balance,setBalance]=useState(0);const[cajas,setCajas]=useState([]);
  const[loading,setLoading]=useState(true);const[input,setInput]=useState("");
  const[screen,setScreen]=useState("chat");const[flow,setFlow]=useState("idle");
  const[draft,setDraft]=useState({tipo:null,amount:null,caja:null,note:"",resolvedMethod:null});
  const[messages,setMessages]=useState([]);const[toast,setToast]=useState(null);
  const endRef=useRef(null);
  const sT=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const chatSaveTimer=useRef(null);

  const refresh=useCallback(async()=>{
    const[txs,bal,cjs]=await Promise.all([API.getTx(user.id,user.role),API.getBalance(user.id,user.role),API.getCajas(user.id,user.role)]);
    setRecords(txs);setBalance(bal);setCajas(cjs);
  },[user.id,user.role]);

  // Load chat from Supabase on init
  useEffect(()=>{
    Promise.all([refresh(),API.loadChat(user.id)]).then(([_,savedMsgs])=>{
      const welcome={id:1,from:"bot",text:isA?`¡Hola ${user.name}! 👋 (Admin)\n\nRegistra movimientos en tus cajas.\nEscríbeme o usa los botones ⬇️`:`¡Hola ${user.name}! 👋\n\nRegistra salidas de tus cajas.\nEscríbeme o toca 💸 Salida ⬇️`,date:new Date().toISOString()};
      if(savedMsgs&&savedMsgs.length>0){setMessages([...savedMsgs,welcome]);}
      else{setMessages([welcome]);}
      setLoading(false);
    });
  },[refresh]);

  useEffect(()=>{setTimeout(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),50);},[messages,flow]);

  // Debounced chat save — saves 1 second after last message
  const schedSave=(msgs)=>{
    if(chatSaveTimer.current)clearTimeout(chatSaveTimer.current);
    chatSaveTimer.current=setTimeout(()=>{API.saveChat(user.id,msgs.slice(-500));},1000);
  };

  const pushB=(prev,t)=>{const m=[...prev,{id:Date.now()+Math.random(),from:"bot",text:t,date:new Date().toISOString()}];setMessages(m);schedSave(m);return m;};
  const pushU=(prev,t)=>{const m=[...prev,{id:Date.now()+Math.random(),from:"user",text:t,date:new Date().toISOString()}];setMessages(m);schedSave(m);return m;};

  const activeCajas=cajas.filter(c=>c.is_active);

  const saveRec=async(tipo,amount,caja,note="")=>{
    const method=draft.resolvedMethod||"efectivo";
    try{await API.addTx(user.id,tipo,amount,caja?.caja_id||null,note,method,"web");await refresh();
      const icon=tipo==="ingreso"?"✅":"📤",lab=tipo==="ingreso"?"INGRESO":"SALIDA";
      const cajaLine=caja?`\n${caja.icon} ${caja.caja_name}`:(draft.note?`\n📌 ${draft.note}`:"");
      const noteLine=note&&note!==draft.note?`\n📝 ${note}`:"";
      pushB(messages,`${icon} ${lab} registrado\n\n💵 ${fmt(amount)}${cajaLine}${noteLine}\n👤 ${user.name}`);
    }catch(e){pushB(messages,"⚠️ Error: "+(e.message||"Intenta de nuevo."));}
    setFlow("idle");setDraft({tipo:null,amount:null,caja:null,note:"",resolvedMethod:null});
  };

  const showSaldo=async()=>{
    const s=await API.getTodaySummary(user.id,user.role);
    let t=`📊 Saldo ${isA?"de mi equipo":"de mis cajas"}:\n${s.saldo<0?"−":""}${fmt(s.saldo)}\n\n📅 Hoy:\n   ▲ ${fmt(s.ingresos)}  ▼ ${fmt(s.salidas)}  📋 ${s.movimientos}`;
    if(activeCajas.length>0){t+=`\n\n🗄️ ${isA?"Cajas":"Mis cajas"}:`;activeCajas.forEach(c=>{t+=`\n   ${c.icon} ${c.caja_name}: ${c.saldo<0?"−":""}${fmt(c.saldo)}`;});}
    pushB(messages,t);
  };

  /* ── Fuzzy matcher for payment methods/banks ── */
  const KNOWN_METHODS=[
    {patterns:/efect|efetiv|cash|plata\s+en\s+mano/i, label:"Efectivo",method:"efectivo",icon:"💵"},
    {patterns:/bancolombia|ban?colom|bncolom/i, label:"Bancolombia",method:"transferencia",icon:"🏦"},
    {patterns:/davivienda|davivien|davibien|davibie/i, label:"Davivienda",method:"transferencia",icon:"🏦"},
    {patterns:/bbva/i, label:"BBVA",method:"transferencia",icon:"🏦"},
    {patterns:/bogot[aá]|banco\s*de\s*bogot/i, label:"Banco de Bogotá",method:"transferencia",icon:"🏦"},
    {patterns:/popular|banco\s*popular/i, label:"Banco Popular",method:"transferencia",icon:"🏦"},
    {patterns:/occidente/i, label:"Banco de Occidente",method:"transferencia",icon:"🏦"},
    {patterns:/scotiabank|colpatria/i, label:"Scotiabank Colpatria",method:"transferencia",icon:"🏦"},
    {patterns:/nequi|nequ[iy]|nequy|neqi/i, label:"Nequi",method:"nequi",icon:"📱"},
    {patterns:/daviplat|davi\s*plat|davipla/i, label:"Daviplata",method:"daviplata",icon:"📲"},
    {patterns:/transf|consig/i, label:"Transferencia",method:"transferencia",icon:"🏦"},
    {patterns:/tarjeta|tc\b|credito|debito/i, label:"Tarjeta",method:"otro",icon:"💳"},
    {patterns:/cheque|cheke/i, label:"Cheque",method:"otro",icon:"💳"},
  ];
  const matchMethod=(text)=>{
    const t=text.toLowerCase().trim();
    // First try exact caja name match
    const cajaMatch=activeCajas.find(c=>t.includes(c.caja_name.toLowerCase())||c.caja_name.toLowerCase().includes(t));
    if(cajaMatch)return{type:"caja",caja:cajaMatch};
    // Then try known methods/banks
    const methodMatch=KNOWN_METHODS.find(m=>m.patterns.test(t));
    if(methodMatch)return{type:"method",label:methodMatch.label,method:methodMatch.method,icon:methodMatch.icon};
    return null;
  };

  const handleSend=()=>{const text=input.trim();if(!text)return;setInput("");const msgs=pushU(messages,text);
    // Context-aware: if in a flow, handle within that context
    if(flow==="pick_type"){
      if(/ingreso|entrada|entr|recib|cobr|lleg/i.test(text)){
        if(!isA){pushB(msgs,"⚠️ Solo puedes registrar salidas. Toca el botón 💸 Salida.");return;}
        pickType("ingreso");return;
      }
      if(/salida|pago|gasto|pagu|compr|gast/i.test(text)){pickType("salida");return;}
      pushB(msgs,`Registrando ${fmt(draft.amount)}.\n${isA?"¿Es ingreso o salida?":"Confirma que es una salida."} Toca un botón o escribe.`);return;
    }
    if(flow==="pick_caja"){
      if(/sin\s*caja|ninguna|directo/i.test(text)){pickCaja(null);return;}
      const resolved=matchMethod(text);
      if(resolved?.type==="caja"){pickCaja(resolved.caja);return;}
      if(resolved?.type==="method"){
        setDraft(d=>({...d,note:d.note||resolved.label,resolvedMethod:resolved.method}));
        pickCaja(null,resolved);return;
      }
      // Can't resolve — ask for clarification but KEEP the draft
      const options=activeCajas.map(c=>`${c.icon} ${c.caja_name}`).join(", ");
      pushB(msgs,`No reconozco "${text}".\n\nRegistrando: ${fmt(draft.amount)} · ${draft.tipo}\n\nEscribe el medio (efectivo, Nequi, Bancolombia...) o elige una caja:\n${options}\n\nO escribe "sin caja" para continuar.`);
      return;
    }
    if(flow==="confirm"){
      if(/^(si|sí|ok|confirmar|dale|listo|va|bien|yes|claro|hecho)$/i.test(text)){confirmF();return;}
      if(/^(no|cancelar|cancel|nop|nel)$/i.test(text)){cancelF();return;}
      // Anything else in confirm = treat as note
      setDraft(d=>({...d,note:text}));
      const cLabel=draft.caja?`${draft.caja.icon} ${draft.caja.caja_name}`:(draft.note||"Sin caja");
      pushB(msgs,`${fmt(draft.amount)} · ${draft.tipo} · ${cLabel}\n📝 ${text}\n\n¿Confirmar?`);
      return;
    }
    if(flow==="add_note"){
      setDraft(d=>({...d,note:text}));
      const cLabel=draft.caja?`${draft.caja.icon} ${draft.caja.caja_name}`:(draft.note||"Sin caja");
      setFlow("confirm");
      pushB(msgs,`${fmt(draft.amount)} · ${draft.tipo} · ${cLabel}\n📝 ${text}\n\n¿Confirmar?`);
      return;
    }
    const p=parseMsg(text);
    if(!p){pushB(msgs,"🤔 No entendí. Prueba:\n\"Entraron 5 millones\"\n\"Pagué 2M\"");return;}
    if(p.type==="saldo"){showSaldo();return;}
    if(p.type==="need_type"){
      if(!isA){
        // Colaborador: auto-assign as salida, skip type selection
        setDraft({tipo:"salida",amount:p.amount,caja:null,note:p.note});
        if(activeCajas.length===0){setFlow("confirm");pushB(msgs,`${fmt(p.amount)} · salida${p.note?` · ${p.note}`:""}\n\n¿Confirmar?`);return;}
        if(activeCajas.length===1){setDraft(d=>({...d,caja:activeCajas[0]}));setFlow("confirm");pushB(msgs,`${fmt(p.amount)} · salida · ${activeCajas[0].icon} ${activeCajas[0].caja_name}\n\n¿Confirmar?`);return;}
        pushB(msgs,`${fmt(p.amount)} como salida.\n¿De cuál caja? ⬇️`);setFlow("pick_caja");return;
      }
      setDraft({tipo:null,amount:p.amount,caja:null,note:p.note});pushB(msgs,`${fmt(p.amount)}. ¿Es ingreso o salida?`);setFlow("pick_type");return;
    }
    if(p.type==="need_caja"){
      if(!isA&&p.tipo==="ingreso"){pushB(msgs,"⚠️ Solo puedes registrar salidas.");return;}
      if(activeCajas.length===0){setDraft({tipo:p.tipo,amount:p.amount,caja:null,note:p.note});setFlow("confirm");pushB(msgs,`${fmt(p.amount)} · ${p.tipo}${p.note?` · ${p.note}`:""}\n\n¿Confirmar?`);return;}
      if(activeCajas.length===1){setDraft({tipo:p.tipo,amount:p.amount,caja:activeCajas[0],note:p.note});setFlow("confirm");pushB(msgs,`${fmt(p.amount)} · ${p.tipo} · ${activeCajas[0].icon} ${activeCajas[0].caja_name}${p.note?` · ${p.note}`:""}\n\n¿Confirmar?`);return;}
      setDraft({tipo:p.tipo,amount:p.amount,caja:null,note:p.note});pushB(msgs,`${fmt(p.amount)} como ${p.tipo}.\n¿Dónde? Escribe el medio o elige una caja ⬇️`);setFlow("pick_caja");return;}
  };

  const startFlow=tipo=>{pushU(messages,tipo==="ingreso"?"💰 Ingreso":"💸 Salida");pushB(messages,"¿De cuánto?");setDraft({tipo,amount:null,caja:null,note:""});setFlow("pick_amount");};
  const pickAmt=v=>{pushU(messages,fmtS(v));setDraft(d=>({...d,amount:v}));
    if(activeCajas.length===0){setDraft(d=>({...d,amount:v,caja:null}));setFlow("confirm");pushB(messages,`${fmt(v)} · ${draft.tipo}\n\n¿Confirmar?`);return;}
    if(activeCajas.length===1){const c=activeCajas[0];setDraft(d=>({...d,amount:v,caja:c}));setFlow("confirm");pushB(messages,`${fmt(v)} · ${draft.tipo} · ${c.icon} ${c.caja_name}\n\n¿Confirmar?`);return;}
    pushB(messages,`${fmt(v)}. ¿En cuál caja?`);setFlow("pick_caja");};
  const pickType=tipo=>{pushU(messages,tipo==="ingreso"?"Ingreso":"Salida");setDraft(d=>({...d,tipo}));
    if(activeCajas.length===0){setFlow("confirm");pushB(messages,`${fmt(draft.amount)} · ${tipo}\n\n¿Confirmar?`);return;}
    if(activeCajas.length===1){const c=activeCajas[0];setDraft(d=>({...d,tipo,caja:c}));setFlow("confirm");pushB(messages,`${fmt(draft.amount)} · ${tipo} · ${c.icon} ${c.caja_name}\n\n¿Confirmar?`);return;}
    pushB(messages,"¿En cuál caja?");setFlow("pick_caja");};
  const pickCaja=(c,resolved)=>{
    if(c){pushU(messages,`${c.icon} ${c.caja_name}`);setDraft(d=>({...d,caja:c}));setFlow("confirm");pushB(messages,`${fmt(draft.amount)} · ${draft.tipo} · ${c.icon} ${c.caja_name}${draft.note?` · ${draft.note}`:""}\n\n¿Todo bien?`);}
    else{
      const label=resolved?`${resolved.icon} ${resolved.label}`:"💼 Sin caja";
      if(!resolved)pushU(messages,"💼 Sin caja");
      setDraft(d=>({...d,caja:null}));
      setFlow("confirm");
      pushB(messages,`${fmt(draft.amount)} · ${draft.tipo} · ${label}${draft.note&&!resolved?` · ${draft.note}`:""}\n\n¿Todo bien?`);
    }
  };
  const confirmF=()=>{pushU(messages,"✓ Confirmar");saveRec(draft.tipo,draft.amount,draft.caja,draft.note||"");};
  const cancelF=()=>{pushU(messages,"✕ Cancelar");pushB(messages,"Cancelado.");setFlow("idle");setDraft({tipo:null,amount:null,caja:null,note:"",resolvedMethod:null});};
  const deleteTx=async(id)=>{
    if(!confirm("¿Eliminar este movimiento?"))return;
    try{await API.deleteTx(id);await refresh();sT("🗑️ Eliminado");}catch{sT("⚠️ Error al eliminar");}
  };
  const logout=()=>{localStorage.removeItem("mc_user");location.reload();};

  const groupByDay=recs=>{const map={};recs.forEach(r=>{const k=r.created_at.slice(0,10);if(!map[k])map[k]=[];map[k].push(r);});return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));};

  if(loading)return ce("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#eae6df"}},ce("div",{style:{width:32,height:32,border:"3px solid #ccc",borderTopColor:"#25d366",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}));
  if(screen==="users")return ce(UsersScreen,{adminId:user.id,onBack:()=>{setScreen("chat");refresh();}});
  if(screen==="cajas")return ce(CajasScreen,{adminId:user.id,onBack:()=>{setScreen("chat");refresh();}});

  let lastDate="";

  return ce("div",{style:{maxWidth:480,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",fontFamily:F,background:"#eae6df",overflow:"hidden"}},
    toast&&ce("div",{style:{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#075e54",color:"#fff",padding:"10px 22px",borderRadius:10,fontSize:14,fontWeight:700,fontFamily:F,zIndex:999}},toast),

    ce("div",{style:{background:"#075e54",padding:"12px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}},
      screen==="history"?ce("button",{style:{background:"none",border:"none",color:"#fff",fontSize:28,cursor:"pointer",fontWeight:300,lineHeight:1},onClick:()=>setScreen("chat")},"‹"):ce("div",{style:{width:40,height:40,borderRadius:"50%",background:"#128c7e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}},"💰"),
      ce("div",{style:{flex:1}},
        ce("div",{style:{color:"#fff",fontSize:17,fontWeight:700}},screen==="chat"?user.name:"Historial",isA&&screen==="chat"&&ce("span",{style:{fontSize:10,background:"rgba(255,255,255,0.2)",padding:"2px 8px",borderRadius:6,marginLeft:8}},"ADMIN")),
        ce("div",{style:{color:"#a8d8c8",fontSize:13,fontWeight:600}},screen==="chat"?`Saldo${isA?" equipo":" mis cajas"}: ${balance<0?"−":""}${fmt(balance)}`:`${records.length} registros`)),
      screen==="chat"&&ce("div",{style:{display:"flex",gap:2}},
        isA&&ce("button",{style:{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:"4px 6px"},onClick:()=>setScreen("cajas")},"🗄️"),
        isA&&ce("button",{style:{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:"4px 6px"},onClick:()=>setScreen("users")},"👥"),
        ce("button",{style:{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:"4px 6px"},onClick:()=>setScreen("history")},"📋"),
        ce("button",{style:{background:"none",border:"none",fontSize:20,cursor:"pointer",padding:"4px 6px"},onClick:logout},"🚪"))),

    screen==="chat"&&[
      ce("div",{key:"ca",style:{flex:1,overflow:"auto",background:"#eae6df"}},ce("div",{style:{padding:"6px 0 12px",display:"flex",flexDirection:"column",justifyContent:"flex-end",minHeight:"100%"}},
        messages.map((msg,i)=>{const dl=dateLabel(msg.date);let show=false;if(dl!==lastDate){show=true;lastDate=dl;}
          return ce("div",{key:msg.id||i},show&&ce(DSep,{label:dl}),ce(Bubble,{from:msg.from,time:timeStr(msg.date)},msg.text));}),
        ce("div",{ref:endRef}))),
      ce("div",{key:"cp",style:{background:"#f0ede8",padding:"8px 12px",flexShrink:0,borderTop:"1px solid #ddd8cf"}},
        flow==="idle"&&ce("div",{style:{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}},
          isA&&ce(Chip,{onClick:()=>startFlow("ingreso"),color:"#0d7a3e"},"💰 Ingreso"),
          ce(Chip,{onClick:()=>startFlow("salida"),color:"#c0392b"},"💸 Salida"),
          ce(Chip,{onClick:showSaldo,color:"#2980b9"},"📊 Saldo")),
        flow==="pick_type"&&ce("div",{style:{display:"flex",gap:8,justifyContent:"center"}},
          isA&&ce(Chip,{onClick:()=>pickType("ingreso"),color:"#0d7a3e"},"💰 Ingreso"),
          ce(Chip,{onClick:()=>pickType("salida"),color:"#c0392b"},"💸 Salida")),
        flow==="pick_amount"&&ce("div",{style:{display:"flex",gap:8,overflowX:"auto",padding:"2px 0"}},[5e5,1e6,2e6,3e6,5e6,10e6,15e6,20e6,50e6,1e8].map(v=>ce(Chip,{key:v,onClick:()=>pickAmt(v),color:"#0d7a3e"},fmtS(v)))),
        flow==="pick_caja"&&ce("div",{style:{display:"flex",gap:8,overflowX:"auto",padding:"2px 0"}},
          activeCajas.map(c=>ce(Chip,{key:c.caja_id,onClick:()=>pickCaja(c),color:"#075e54"},`${c.icon} ${c.caja_name}`)),
          ce(Chip,{key:"efe",onClick:()=>{setDraft(d=>({...d,note:"Efectivo",resolvedMethod:"efectivo"}));pickCaja(null,{icon:"💵",label:"Efectivo"});},color:"#666"},"💵 Efectivo"),
          ce(Chip,{key:"neq",onClick:()=>{setDraft(d=>({...d,note:"Nequi",resolvedMethod:"nequi"}));pickCaja(null,{icon:"📱",label:"Nequi"});},color:"#666"},"📱 Nequi"),
          ce(Chip,{key:"dav",onClick:()=>{setDraft(d=>({...d,note:"Daviplata",resolvedMethod:"daviplata"}));pickCaja(null,{icon:"📲",label:"Daviplata"});},color:"#666"},"📲 Daviplata"),
          ce(Chip,{key:"ban",onClick:()=>{setDraft(d=>({...d,note:"Bancolombia",resolvedMethod:"transferencia"}));pickCaja(null,{icon:"🏦",label:"Bancolombia"});},color:"#666"},"🏦 Banco"),
          ce(Chip,{key:"none",onClick:()=>pickCaja(null),color:"#999"},"💼 Sin caja")),
        flow==="confirm"&&ce("div",{style:{display:"flex",gap:8,justifyContent:"center"}},
          ce(Chip,{onClick:confirmF,color:"#0d7a3e",active:true},"✓ Confirmar"),
          ce(Chip,{onClick:()=>{pushB(messages,"📝 Escribe la nota:");setFlow("add_note");},color:"#2980b9"},"📝 Nota"),
          ce(Chip,{onClick:cancelF,color:"#999"},"✕ Cancelar")),
        flow==="add_note"&&ce("div",{style:{display:"flex",gap:8,justifyContent:"center"}},
          ce(Chip,{onClick:()=>{setFlow("confirm");pushB(messages,"OK, sin nota. ¿Confirmar?");},color:"#999"},"Saltar"))),
      ce("div",{key:"ib",style:{display:"flex",alignItems:"center",gap:8,padding:"6px 10px 10px",background:"#f0ede8",flexShrink:0}},
        ce("input",{type:"text",style:{flex:1,padding:"11px 16px",border:"none",borderRadius:22,fontSize:15,fontFamily:F,background:"#fff",color:"#1a1a1a"},placeholder:"Escribe o usa los botones...",value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>{if(e.key==="Enter"){e.preventDefault();handleSend();}}}),
        ce("button",{style:{width:44,height:44,borderRadius:"50%",border:"none",background:"#25d366",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:input.trim()?1:.35},onClick:handleSend,disabled:!input.trim()},
          ce("svg",{viewBox:"0 0 24 24",width:22,height:22,fill:"#fff"},ce("path",{d:"M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"}))))],

    screen==="history"&&ce("div",{style:{flex:1,overflow:"auto",padding:"12px 14px",background:"#f4f3ef"}},
      records.length===0?ce("div",{style:{textAlign:"center",padding:"60px 0",color:"#999",fontSize:15,fontWeight:600}},"📭 Sin registros"):
      groupByDay(records).map(([dk,dr])=>{
        const dI=dr.filter(r=>r.type==="ingreso").reduce((s,r)=>s+r.amount,0);
        const dO=dr.filter(r=>r.type==="salida").reduce((s,r)=>s+r.amount,0);
        const d=new Date(dk+"T12:00:00"),ds=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"],ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
        const lb=dateLabel(dk+"T12:00:00");
        return ce("div",{key:dk,style:{marginBottom:16}},
          ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            ce("span",{style:{fontSize:14,fontWeight:800}},lb==="Hoy"||lb==="Ayer"?lb:`${ds[d.getDay()]} ${d.getDate()} ${ms[d.getMonth()]}`),
            ce("span",{style:{fontSize:12,fontWeight:700}},ce("span",{style:{color:"#0d7a3e"}},"+"+fmtS(dI))," · ",ce("span",{style:{color:"#c0392b"}},"−"+fmtS(dO)))),
          dr.map(r=>{const isIn=r.type==="ingreso";const cj=r.cajas;const uN=r.users?.name||"";
            const canDelete=isA;
            return ce("div",{key:r.id,style:{display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:12,padding:"11px 12px",marginBottom:5,boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}},
              ce("div",{style:{width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700,flexShrink:0,background:isIn?"#0d7a3e":"#c0392b"}},isIn?"↓":"↑"),
              ce("div",{style:{flex:1}},
                ce("div",{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
                  ce("span",{style:{fontSize:16,fontWeight:800,color:isIn?"#0d7a3e":"#c0392b"}},(isIn?"+":"−")+fmt(r.amount)),
                  cj&&ce("span",{style:{fontSize:12,background:"#f0ede8",padding:"1px 8px",borderRadius:6,fontWeight:600}},cj.icon+" "+cj.name),
                  r.source==="whatsapp"&&ce("span",{style:{fontSize:10,background:"#dcf8c6",padding:"1px 6px",borderRadius:4,fontWeight:700,color:"#075e54"}},"WA")),
                isA&&uN&&ce("div",{style:{fontSize:12,fontWeight:700,color:"#075e54",marginTop:1}},"👤 "+uN),
                r.note&&ce("div",{style:{fontSize:13,color:"#777"}},r.note),
                ce("div",{style:{fontSize:11,color:"#aaa"}},timeStr(r.created_at))),
              canDelete&&ce("button",{onClick:()=>deleteTx(r.id),style:{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:"4px 8px",color:"#ccc",flexShrink:0}},"🗑️"));}));}))
  );
}

/* ═══ ROOT ═══ */
function Root(){const[user,setUser]=useState(null);const[ck,setCk]=useState(true);
useEffect(()=>{try{const u=JSON.parse(localStorage.getItem("mc_user"));if(u?.id)setUser(u);}catch{}setCk(false);},[]);
if(ck)return ce("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#075e54"}},ce("div",{style:{width:32,height:32,border:"3px solid rgba(255,255,255,0.2)",borderTopColor:"#25d366",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}));
if(!user)return ce(LoginScreen,{onLogin:setUser});return ce(MainApp,{user});}
ReactDOM.createRoot(document.getElementById("root")).render(ce(Root));
</script>
